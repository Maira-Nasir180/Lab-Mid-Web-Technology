<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Place Order | SweetBite Bakery</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold text-primary" href="index.html">SweetBite</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
          <li class="nav-item"><a class="nav-link active" href="order.html">Place Order</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
          <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
          <li class="nav-item"><a class="nav-link" href="reviews.html">Reviews</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Order Section -->
  <section class="order-section py-5">
    <div class="container">
      <h2 class="text-center mb-4 fw-bold text-brown">Place Your Order</h2>
      <form id="orderForm" class="col-md-8 mx-auto bg-light p-4 rounded shadow-sm">

        <!-- Customer Info -->
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" id="name" class="form-control" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <input type="email" id="email" class="form-control" required>
        </div>

        <!-- Item Selection -->
        <div class="mb-3">
          <label class="form-label">Select Item</label>
          <select id="item" class="form-select">
            <option value="">-- Choose an Item --</option>
            <option value="Chocolate Cake">Chocolate Cake - PKR 1500</option>
            <option value="Cupcake">Cupcake - PKR 250</option>
            <option value="Macaron">Macaron - PKR 350</option>
            <option value="Cookies">Cookies - PKR 300</option>
            <option value="Blueberry Cake">Blueberry Cake - PKR 2000</option>
            <option value="Croissant">Croissant - PKR 500</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Quantity</label>
          <input type="number" id="quantity" class="form-control" min="1" value="1">
        </div>

        <button type="button" id="addItem" class="btn btn-order w-100 mb-3">Add Item</button>

        <!-- Cart Section -->
        <div id="cartContainer" class="bg-white p-3 rounded shadow-sm mb-3" style="display:none;">
          <h5 class="text-center text-brown mb-3">🛒 Your Cart</h5>
          <ul id="cartList" class="list-group mb-3"></ul>
          <button type="button" id="clearCart" class="btn btn-sm btn-outline-danger w-100 mt-2">Clear All Items</button>
        </div>

        <!-- Address -->
        <div class="mb-3">
          <label class="form-label">Delivery Address</label>
          <textarea id="address" class="form-control" rows="3" required></textarea>
        </div>

        <button type="submit" class="btn btn-order w-100">Submit Order</button>
      </form>
    </div>
  </section>

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
