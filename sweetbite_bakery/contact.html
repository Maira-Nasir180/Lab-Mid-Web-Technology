<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - SweetBite Bakery</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 🌟 Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold text-primary" href="index.html">SweetBite</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
          <li class="nav-item"><a class="nav-link" href="order.html">Place Order</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
          <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
          <li class="nav-item"><a class="nav-link" href="reviews.html">Reviews</a></li>
          <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- 📞 Contact Section -->
  <section class="contact-section py-5">
    <div class="container">
      <h2 class="text-center fw-bold mb-4">Get in Touch</h2>
      <div class="row g-5 align-items-center">
        <!-- 📝 Contact Form -->
        <div class="col-md-6">
          <form id="contactForm" class="p-4 rounded shadow bg-white">
            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-control" placeholder="Enter your name" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" placeholder="Enter your email" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Message</label>
              <textarea class="form-control" rows="4" placeholder="Write your message" required></textarea>
            </div>
            <button type="submit" class="btn btn-custom w-100">Send Message</button>
          </form>
        </div>

        <!-- 🧁 Bakery Info -->
        <div class="col-md-6 text-center">
          <h4 class="fw-bold mb-3 text-danger">SweetBite Bakery</h4>
          <p><i class="bi bi-geo-alt-fill text-danger me-2"></i><strong>Address:</strong> 22 Bakery Street, Lahore, Pakistan</p>
          <p><i class="bi bi-telephone-fill text-success me-2"></i><strong>Phone:</strong> +92 312 5556789</p>
          <p><i class="bi bi-envelope-fill text-primary me-2"></i><strong>Email:</strong> sweetbitebakery@gmail.com</p>

          <!-- 🌐 Social Links -->
          <div class="social-icons mt-4">
            <a href="#" class="me-3 text-decoration-none fs-4 text-primary"><i class="bi bi-facebook"></i></a>
            <a href="#" class="me-3 text-decoration-none fs-4 text-danger"><i class="bi bi-instagram"></i></a>
            <a href="mailto:sweetbitebakery@gmail.com" class="text-decoration-none fs-4 text-info"><i class="bi bi-envelope-fill"></i></a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ✨ JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.querySelector("#contactForm").addEventListener("submit", e => {
      e.preventDefault();
      alert("Thank you for contacting SweetBite Bakery! We'll get back to you soon 🍰");
    });
  </script>
</body>
</html>
